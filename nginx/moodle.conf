server {
    listen 80;
    server_name _; 
    
    root /var/www/html;
    index index.php index.html;

    # Ocultar la versión de Nginx
    server_tokens off;

    # Cabeceras de seguridad estrictas
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Bloquear acceso a archivos ocultos (como .git, .env)
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Bloquear lectura de archivos de configuración, logs y directorios internos
    location ~* /(config\.php|readme\.txt|upgrade\.txt|install\.xml|moodledata) {
        deny all;
        return 404;
    }

    # Bloquear acceso directo a scripts de línea de comandos CLI de Moodle
    location ~* ^/(admin/cli|admin/tool/task/cli)/.* {
        deny all;
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pasar PHP al contenedor php-fpm
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # Apunta al nombre del servicio en el docker-compose (php)
        fastcgi_pass php:9000; 
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Mitigación de vulnerabilidad Proxy
        fastcgi_param HTTP_PROXY "";

        # Aumentar timeouts para tareas pesadas
        fastcgi_read_timeout 300;
    }
}