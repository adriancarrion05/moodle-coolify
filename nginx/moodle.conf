# Zona de rate limiting exclusiva para el endpoint de login
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/s;

server {
    listen 80;
    server_name _;
    server_tokens off;

    root /var/www/html/public;
    index index.php;

    # ── Cabeceras de seguridad ──────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;" always;
    # HSTS: fuerza HTTPS durante 1 año, previene downgrade y robo de cookies de sesión
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # X-XSS-Protection omitido: deprecated en navegadores modernos, cubierto por CSP

    # ── Bloquear archivos ocultos (.git, .env, etc.) ────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Bloquear archivos sensibles de Moodle ──────────────────────────────
    location ~* /(config\.php|readme\.txt|upgrade\.txt|install\.xml|moodledata) {
        deny all;
        return 404;
    }

    # ── Bloquear CLI de Moodle por HTTP ────────────────────────────────────
    location ~* ^/(admin/cli|admin/tool/task/cli)/.* {
        deny all;
        return 404;
    }

    # ── Rate limiting SOLO en el endpoint de login ─────────────────────────
    # El limit_req global ha sido eliminado para evitar falsos positivos
    # en usuarios legítimos navegando el LMS.
    location = /login/index.php {
        limit_req zone=login burst=5 nodelay;
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 300;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 300;
    }
}