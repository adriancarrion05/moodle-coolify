services:
  db:
    image: mariadb:10.11
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build: ./php
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - SERVICE_URL_NGINX=${SERVICE_URL_NGINX}
      - MOODLE_ADMIN_USER=${MOODLE_ADMIN_USER:-admin}
      - MOODLE_ADMIN_PASS=${MOODLE_ADMIN_PASS}
      - MOODLE_ADMIN_EMAIL=${MOODLE_ADMIN_EMAIL}
    volumes:
      - moodledata:/var/www/moodledata
      - moodle_config:/config_mount
      - moodle_html:/var/www/html
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # php en ambas redes: habla con nginx (frontend) y con db (backend)
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build: ./nginx
    restart: unless-stopped
    volumes:
      - moodle_html:/var/www/html
    security_opt:
      - no-new-privileges:true
    # nginx solo en red frontend: no tiene acceso directo a la base de datos
    networks:
      - frontend
    depends_on:
      - php

volumes:
  db_data:
    name: moodle_db_data
  moodledata:
    name: moodle_data
  moodle_config:
    name: moodle_config_file
  moodle_html:
    name: moodle_html_files

# Redes segmentadas:
#   frontend → nginx ↔ php  (tráfico HTTP/FastCGI)
#   backend  → php  ↔ db    (tráfico MySQL, aislado de nginx)
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true   # la red de base de datos no tiene salida a internet