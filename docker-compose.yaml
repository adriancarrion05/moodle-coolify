services:
  db:
    image: mariadb:10.11
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build: ./php
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - SERVICE_URL_NGINX=${SERVICE_URL_NGINX}
      - MOODLE_ADMIN_USER=${MOODLE_ADMIN_USER}
      - MOODLE_ADMIN_PASS=${MOODLE_ADMIN_PASS}  # Sin fallback — forzar definición explícita
    volumes:
      - moodledata:/var/www/moodledata
      - moodle_config:/config_mount
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 15s
      timeout: 5s
      retries: 3

  nginx:
    build: ./nginx
    restart: unless-stopped
    # ← Eliminado el volumen moodle_config: Nginx no necesita config.php
    security_opt:
      - no-new-privileges:true
    depends_on:
      php:
        condition: service_healthy

  cron:
    build: ./php
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: ["cron-loop"]  # ← Manejado limpiamente en entrypoint.sh
    volumes:
      - moodledata:/var/www/moodledata
      - moodle_config:/config_mount
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      db:
        condition: service_healthy
      php:
        condition: service_healthy

volumes:
  db_data:
    name: moodle_db_data
  moodledata:
    name: moodle_data
  moodle_config:
    name: moodle_config_file