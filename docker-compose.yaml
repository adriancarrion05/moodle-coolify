services:
  db:
    image: mariadb:10.11
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build: ./php
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - SERVICE_URL_NGINX=${SERVICE_URL_NGINX}
      - MOODLE_ADMIN_USER=${MOODLE_ADMIN_USER:-admin}
      - MOODLE_ADMIN_PASS=${MOODLE_ADMIN_PASS}
    volumes:
      - moodledata:/var/www/moodledata
      - moodle_config:/config_mount
      - moodle_html:/var/www/html   # ← volumen compartido con nginx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine        # ← imagen directa, sin build propio
    restart: unless-stopped
    volumes:
      - moodle_html:/var/www/html   # ← mismos archivos que php
      - ./nginx/moodle.conf:/etc/nginx/conf.d/moodle.conf:ro
    security_opt:
      - no-new-privileges:true
    depends_on:
      - php

  cron:
    build: ./php
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: ["cron-loop"]
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - moodledata:/var/www/moodledata
      - moodle_config:/config_mount
      - moodle_html:/var/www/html
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      db:
        condition: service_healthy
      php:
        condition: service_started

volumes:
  db_data:
    name: moodle_db_data
  moodledata:
    name: moodle_data
  moodle_config:
    name: moodle_config_file
  moodle_html:
    name: moodle_html_files    # ← nuevo volumen compartido